services:
  - type: web
    name: stremio-moviebox
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: .venv/bin/python -m server.main
    healthCheckPath: /manifest.json
    envVars:
      - key: PORT
        value: 8000
      - key: PROXY_URL
        sync: false
