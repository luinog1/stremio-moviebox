<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieBox Addon Configuration</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #e50914;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #3d3d3d;
            color: white;
            box-sizing: border-box;
        }
        .help-text {
            font-size: 0.85em;
            color: #aaa;
            margin-top: 5px;
        }
        .btn {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #f40612;
        }
        .cookie-section {
            background-color: #3d3d3d;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #e50914;
        }
        .cookie-section h3 {
            margin-top: 0;
            color: #e50914;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MovieBox Addon</h1>
        
        <div class="cookie-section">
            <h3>🔑 FEBOX Cookie (Opcional)</h3>
            <p style="font-size: 0.9em; color: #ccc;">
                Para streams em 4K, forneça seu cookie FEBOX do MovieBox.
                Sem isso, apenas streams em 1080p estarão disponíveis.
            </p>
            <div class="form-group">
                <label for="febox_cookie">Valor do Cookie FEBOX:</label>
                <textarea id="febox_cookie" rows="3" placeholder="eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..."></textarea>
                <div class="help-text">
                    Cole seu cookie FEBOX aqui.
                </div>
            </div>
        </div>
        
        <div class="form-group">
            <label for="resolution">Resolução Mínima:</label>
            <select id="resolution">
                <option value="all">Todas Resoluções</option>
                <option value="4k">Somente 4K</option>
                <option value="1080p">1080p e acima</option>
                <option value="720p">720p e acima</option>
                <option value="480p">480p e acima</option>
            </select>
            <div class="help-text">
                Selecione "Somente 4K" para filtrar streams 4K (requer cookie FEBOX).
            </div>
        </div>
        
        <div class="form-group">
            <label for="language">Idioma:</label>
            <select id="language">
                <option value="all">Todos Idiomas</option>
                <option value="en">Inglês</option>
                <option value="es">Espanhol</option>
                <option value="fr">Francês</option>
                <option value="de">Alemão</option>
                <option value="pt">Português</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="layout">Estilo de Layout:</label>
            <select id="layout">
                <option value="cinematic">Cinematic</option>
                <option value="compact">Compact</option>
                <option value="torrentio">Torrentio Style</option>
            </select>
        </div>
        
        <button class="btn" onclick="installAddon()">Instalar Addon</button>
    </div>

    <script>
        function installAddon() {
            const config = {
                resolution: document.getElementById('resolution').value,
                language: document.getElementById('language').value,
                layout: document.getElementById('layout').value,
                febox_cookie: document.getElementById('febox_cookie').value || null
            };
            
            // Converter configuração para base64 no próprio navegador
            const config_json = JSON.stringify(config);
            const config_base64 = btoa(config_json);
            
            // Construir URL de instalação
            const baseUrl = window.location.origin;
            const installUrl = `${baseUrl}/${config_base64}/manifest.json`;
            
            // Redirecionar para o Stremio
            window.location.href = installUrl;
        }
    </script>
</body>
</html>
